name: update-dashboard

# 毎営業日の朝(JST)に基準価額を取得し、ダッシュボードを更新してGitHub Pagesに公開する。
on:
  schedule:
    - cron: "0 22 * * 0-4"   # UTC 22:00(日〜木) = JST 07:00(月〜金)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 基準価額を取得しHTMLを生成
        env:
          WEIGHTS: ${{ secrets.WEIGHTS }}   # 金額(評価額)はSecretから注入。リポジトリには置かない
        run: |
          python3 fetch_nav.py
          python3 generate_html.py

      - name: 履歴とHTMLをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json dashboard.html
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: 日次の基準価額を更新 [skip ci]"
            git push
          fi

      - name: Pages用に配置(index.html)
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
